# Keep npm deps and Actions current (security + compatibility)
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - infra
    groups:
      electron-stack:
        patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"
          - "electron-store"
      production-minor:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infra
