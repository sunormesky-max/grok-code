name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.1). Leave empty to build current ref without publish."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Build & publish GitHub Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            eb_args: --win
          - os: ubuntu-latest
            eb_args: --linux
          - os: macos-latest
            eb_args: --mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build catalog & icons
        run: |
          npm run catalog
          npm run icons

      # Build only — upload is softprops below.
      # Do not pass GH_TOKEN here: with package.json publish.provider=github,
      # electron-builder will try to create a GitHubPublisher and fail without token
      # (and race latest.yml if token is present). Explicit --publish never.
      - name: Build distributables
        run: npx electron-builder ${{ matrix.eb_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          generate_release_notes: true
          draft: false
          make_latest: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
