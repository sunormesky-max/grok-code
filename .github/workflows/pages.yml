name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/catalog/**"
      - "examples/**"
      - "scripts/build-catalog.js"
      - "renderer/catalog-data.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install & build catalog
        run: |
          npm ci
          npm run catalog

      - name: Stage site
        run: |
          mkdir -p _site
          cp docs/catalog/index.html _site/index.html
          cp docs/catalog/catalog-data.json _site/catalog-data.json
          # also keep relative path used by index fallbacks
          cp docs/catalog/catalog-data.json _site/catalog-data.json
          printf 'GrokCode Catalog\n' > _site/README.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
